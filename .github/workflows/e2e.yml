name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  E2E_TESTS_ENABLED: "1"

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio testcontainers
          pip install -e packages/orchestration
      
      - name: Set up Docker Compose
        run: |
          docker compose version
      
      - name: Run E2E Tests
        run: |
          cd packages/orchestration/tests/e2e
          pytest test_happy_path.py -v --tb=short
        env:
          E2E_TESTS_ENABLED: "1"
      
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-artifacts
          path: |
            packages/orchestration/tests/e2e/artifacts/
            /tmp/openclaw/
      
      - name: Cleanup
        if: always()
        run: |
          cd packages/orchestration/tests/e2e/fixtures
          docker compose down --volumes --remove-orphans
